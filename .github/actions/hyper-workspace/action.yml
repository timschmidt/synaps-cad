name: Checkout Hyper workspace
description: Fetch the exact sibling repositories required by local path dependencies

runs:
  using: composite
  steps:
    - name: Fetch pinned Hyper repositories
      shell: bash
      run: |
        set -euo pipefail

        checkout_repo() {
          local name="$1"
          local url="$2"
          local revision="$3"
          local destination="${GITHUB_WORKSPACE}/../${name}"

          git init "${destination}"
          git -C "${destination}" remote add origin "${url}"
          git -C "${destination}" fetch --depth 1 origin "${revision}"
          git -C "${destination}" checkout --detach FETCH_HEAD
        }

        checkout_repo csgrs https://github.com/timschmidt/csgrs.git 1a7328973dabdfa342ea9281cbc456ab64d7d1fb
        checkout_repo hypercurve https://github.com/timschmidt/hypercurve.git 0d7435cb2edcbb1de9f7234639bd572d0f5f3734
        checkout_repo hyperlattice https://github.com/timschmidt/hyperlattice.git 95f92205b9439e7922f958de37c90a8664d2d497
        checkout_repo hyperlimit https://github.com/timschmidt/hyperlimit.git d4b323f9dfc5fcffd531ec8c2299640d76e27b6d
        checkout_repo hypermesh https://github.com/timschmidt/hypermesh.git c79e90586355b4b1d98d6b328eeb320a97d8c96e
        checkout_repo hyperphysics https://github.com/timschmidt/hyperphysics.git a1d698d73521e3c1bcf3f545530a9c2b9af46666
        checkout_repo hyperreal https://github.com/timschmidt/hyperreal.git 2dbbfa85dba00fb2bdd35cfd810e2573cd0c27f6
        checkout_repo hypersdf https://github.com/timschmidt/hypersdf.git af5f939cc4841434d113c9d29ef797ed87694e4f
        checkout_repo hypersolve https://github.com/timschmidt/hypersolve.git 00f808f6403a595101680cac12e25bf770249c0c
        checkout_repo hypertri https://github.com/timschmidt/hypertriangulate.git b8d6d85726da6ca3d3da92d585e9d2d29b222bb7
