name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: ./.github/actions/hyper-workspace

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            pkg-config \
            libx11-dev libxi-dev libxcursor-dev libxrandr-dev libxinerama-dev \
            libwayland-dev libxkbcommon-dev \
            libasound2-dev libudev-dev \
            libgtk-3-dev

      - uses: Swatinem/rust-cache@v2

      - name: Run tests
        run: .github/scripts/test-ci.sh

  build:
    name: Build ${{ matrix.name }}
    needs: test
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux x86_64
            os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: synaps-cad-linux-x86_64.tar.gz
          - name: macOS Apple Silicon
            os: macos-latest
            target: aarch64-apple-darwin
            artifact: synaps-cad-macos-aarch64.tar.gz
          - name: macOS Intel
            os: macos-latest
            target: x86_64-apple-darwin
            artifact: synaps-cad-macos-x86_64.tar.gz
          - name: Windows x86_64
            os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: synaps-cad-windows-x86_64.zip

    steps:
      - uses: actions/checkout@v6

      - uses: ./.github/actions/hyper-workspace

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            pkg-config \
            libx11-dev libxi-dev libxcursor-dev libxrandr-dev libxinerama-dev \
            libwayland-dev libxkbcommon-dev \
            libasound2-dev libudev-dev \
            libgtk-3-dev

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Build
        run: cargo build --locked --release --target ${{ matrix.target }}

      - name: Package (macOS .app bundle)
        if: runner.os == 'macOS'
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          APP="SynapsCAD.app"
          mkdir -p "$APP/Contents/MacOS"
          mkdir -p "$APP/Contents/Resources"
          cp target/${{ matrix.target }}/release/synaps-cad "$APP/Contents/MacOS/"
          cp assets/icon.icns "$APP/Contents/Resources/icon.icns"
          sed "s/\${APP_VERSION}/$VERSION/g" assets/macos/Info.plist > "$APP/Contents/Info.plist"
          # Ad-hoc code sign so macOS doesn't block the app
          codesign --force --deep -s - "$APP"
          tar czf ${{ matrix.artifact }} "$APP"

      - name: Package (Linux)
        if: runner.os == 'Linux'
        run: |
          cd target/${{ matrix.target }}/release
          tar czf ../../../${{ matrix.artifact }} synaps-cad
          cd ../../..

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Compress-Archive -Path target/${{ matrix.target }}/release/synaps-cad.exe -DestinationPath ${{ matrix.artifact }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Extract changelog for this version
        id: changelog
        run: |
          # Extract the section for the current tag's version from CHANGELOG.md
          VERSION="${GITHUB_REF_NAME#v}"
          # Get everything between this version's header and the next version header
          NOTES=$(awk "/^## \[${VERSION}\]/{found=1; next} /^## \[/{if(found) exit} found{print}" CHANGELOG.md)
          # Write to file to avoid escaping issues
          echo "$NOTES" > release_notes.md

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: release_notes.md
          files: artifacts/*
