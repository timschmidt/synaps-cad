name: Deploy Web

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build WASM
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: ./.github/actions/hyper-workspace

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - uses: Swatinem/rust-cache@v2
        with:
          key: wasm32-unknown-unknown

      - name: Install wasm-bindgen CLI
        shell: bash
        run: |
          WASM_BINDGEN_VERSION="$(awk '
            $0 == "name = \"wasm-bindgen\"" { found = 1; next }
            found && $1 == "version" {
              gsub(/"/, "", $3)
              print $3
              exit
            }
          ' Cargo.lock)"
          test -n "${WASM_BINDGEN_VERSION}"
          cargo install wasm-bindgen-cli --version "${WASM_BINDGEN_VERSION}" --locked

      - name: Build WASM
        run: cargo build --locked --release --target wasm32-unknown-unknown

      - name: Generate web bindings
        run: |
          mkdir -p dist/pkg
          wasm-bindgen \
            --target web \
            --out-dir dist/pkg \
            --out-name synaps_cad \
            target/wasm32-unknown-unknown/release/synaps-cad.wasm

      - name: Copy static files
        run: |
          cp web/index.html dist/index.html
          touch dist/.nojekyll

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    name: Deploy
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
