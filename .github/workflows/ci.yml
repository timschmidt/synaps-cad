name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: ./.github/actions/hyper-workspace

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            pkg-config \
            libx11-dev libxi-dev libxcursor-dev libxrandr-dev libxinerama-dev \
            libwayland-dev libxkbcommon-dev \
            libasound2-dev libudev-dev \
            libgtk-3-dev

      - uses: Swatinem/rust-cache@v2

      - name: Run tests
        run: .github/scripts/test-ci.sh

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: ./.github/actions/hyper-workspace

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            pkg-config \
            libx11-dev libxi-dev libxcursor-dev libxrandr-dev libxinerama-dev \
            libwayland-dev libxkbcommon-dev \
            libasound2-dev libudev-dev \
            libgtk-3-dev

      - uses: Swatinem/rust-cache@v2

      - name: Run clippy
        run: cargo clippy --locked -- -D warnings

  web:
    name: Web demo
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: ./.github/actions/hyper-workspace

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - uses: Swatinem/rust-cache@v2
        with:
          key: wasm32-unknown-unknown

      - name: Install wasm-bindgen CLI
        shell: bash
        run: |
          WASM_BINDGEN_VERSION="$(awk '
            $0 == "name = \"wasm-bindgen\"" { found = 1; next }
            found && $1 == "version" {
              gsub(/"/, "", $3)
              print $3
              exit
            }
          ' Cargo.lock)"
          test -n "${WASM_BINDGEN_VERSION}"
          cargo install wasm-bindgen-cli --version "${WASM_BINDGEN_VERSION}" --locked

      - name: Build web demo
        run: .github/scripts/build-web.sh
